<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Zadania domowe</title>

  <style>
    body {
      font-family: system-ui, Arial;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    #list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task {
      background: #111827;
      border: 1px solid #1f2937;
      padding: 14px;
      border-radius: 12px;
      transition: 0.2s;
    }

    .ingested {
      color: #64748b;
      font-size: 12px;
      margin-top: 4px;
    }

    .task:hover {
      transform: translateY(-2px);
      border-color: #334155;
    }

    .subject {
      font-weight: 600;
      font-size: 15px;
    }

    .date {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 4px;
    }

    .empty {
      color: #64748b;
    }
  </style>
</head>

<body>

<h1>📚 Zadania domowe</h1>
<div id="list">Ładowanie...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseClient = supabase.createClient(
    'https://pyrkcqdgteywmwbkvufm.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5cmtjcWRndGV5d213Ymt2dWZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5Mjc0NzEsImV4cCI6MjA5MzUwMzQ3MX0.ea3z10fBnKkUIrDBUbfQL3lgKuB_xpKFuHnQVrbW5mU'
  );

  async function loadTasks() {
    const { data, error } = await supabaseClient
      .from('homework')
      .select('*')
      .order('target_date', { ascending: false });

    const list = document.getElementById('list');

    if (error) {
      list.innerHTML = '❌ Błąd ładowania danych';
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">Brak zadań</div>';
      return;
    }

    list.innerHTML = '';

   data.forEach(task => {
  const div = document.createElement('div');
  div.className = 'task';

  const target = new Date(task.target_date).toLocaleString();
  const ingested = new Date(task.ingested_at).toLocaleString();

  div.innerHTML = `
    <div class="subject">${task.przedmiot}</div>

    <div class="date">
      📌 deadline: <b>${target}</b>
    </div>

    <div class="ingested">
      ⏱ pobrane: ${ingested}
    </div>
  `;

  list.appendChild(div);
});
  }

  loadTasks();
</script>

</body>
</html>
