name: EduVulcan Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: npm install
      - run: npx playwright install --with-deps

      - run: node index.js
        env:
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Save results
        uses: actions/upload-artifact@v4
        with:
          name: tasks
          path: tasks.json
